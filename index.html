    <!-- Estilos de Emergencia para Ocultar el Formulario Antiguo y Pulir el Diseño -->
    <style>
        /* Ocultar secciones de contacto antiguas generadas por React */
        section#contacto, 
        section:has(form),

        .contact-section {

        /* Estilos para el Botón Flotante de WhatsApp */
        .wa-float {
            position: fixed;
            bottom: 20px;

            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .wa-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }
        .wa-tooltip {
            position: absolute;
            right: 75px;
            background: white;
            color: #333;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .wa-float:hover .wa-tooltip {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <script>
        // Lógica para inyectar la sección conversacional y limpiar el sitio
        function cleanAndInject() {
            const footer = document.querySelector('footer');
            if (footer && !document.getElementById('publikeno-new-contact')) {
                const section = document.createElement('section');
                section.id = 'publikeno-new-contact';
                section.className = 'py-24 bg-slate-900 text-white border-t border-slate-800';
                section.innerHTML = `
                    <div class="container mx-auto px-4 max-w-4xl text-center">
                        <h2 class="text-4xl md:text-5xl font-bold mb-6 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                            ¿Listo para escalar tu negocio?
                        </h2>
                        <p class="text-xl text-gray-400 mb-10">
                            Hablemos directamente por WhatsApp y descubre cómo podemos ayudarte a generar más leads hoy mismo.
                        </p>
                        <div class="flex flex-col md:flex-row items-center justify-center gap-6">

                            </a>
                            <a href="https://wa.me/5219981545555?text=Hola%20Publikeno,%20quiero%20más%20información%20sobre%20sus%20servicios." 
                               style="border: 2px solid #60a5fa; color: #60a5fa; padding: 1rem 2rem; border-radius: 0.75rem; font-weight: bold; text-decoration: none; min-width: 280px;">
                                💬 Chatear con un experto

                        </div>
                        <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm text-gray-500">
                            <div><span class="text-blue-500 font-bold">⚡ Respuesta inmediata</span><br>Menos de 5 minutos.</div>
                            <div><span class="text-blue-500 font-bold">🎯 Estrategia a medida</span><br>Analizamos tu caso.</div>
                            <div><span class="text-blue-500 font-bold">🤖 Tecnología IA</span><br>Automatización avanzada.</div>
                        </div>
                    </div>
                `;
                footer.parentNode.insertBefore(section, footer);
            }
            
            // Ocultar cualquier rastro de formularios antiguos que React intente pintar
            document.querySelectorAll('form, input[type="email"], textarea').forEach(el => {
                const parentSection = el.closest('section');
                if (parentSection && parentSection.id !== 'publikeno-new-contact') {
                    parentSection.style.display = 'none';
                }
            });
        }

        // Ejecutar limpieza periódicamente para combatir la re-renderización de React
        setInterval(cleanAndInject, 500);
    </script>
