    <!-- Formulario de Contacto -->
    <section id="contacto" class="py-20 bg-slate-900 text-white">
        <div class="container mx-auto px-4 max-w-4xl">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold mb-4">Contáctanos</h2>
                <p class="text-gray-400">Envíanos un mensaje y te responderemos a la brevedad.</p>
            </div>
            <div class="bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Nombre Completo</label>
                        <input type="text" id="contact-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Teléfono / WhatsApp</label>
                        <input type="tel" id="contact-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">¿En qué podemos ayudarte?</label>
                    <textarea id="contact-message" rows="4" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
                </div>
                <button onclick="sendEmail()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition duration-300 transform hover:scale-[1.02]">
                    Enviar por Correo
                </button>
                <p class="text-center text-gray-500 mt-4 text-sm">Al hacer clic, se abrirá tu aplicación de correo para enviar el mensaje.</p>
            </div>
        </div>
    </section>

    <script>
        function sendEmail() {
            const name = document.getElementById('contact-name').value;
            const phone = document.getElementById('contact-phone').value;
            const message = document.getElementById('contact-message').value;
            
            if(!name || !phone || !message) {
                alert('Por favor, llena todos los campos.');
                return;
            }

            const subject = encodeURIComponent('Nuevo Lead de Publikeno.com');
            const body = encodeURIComponent(`Nombre: ${name}\nTeléfono: ${phone}\n\nMensaje:\n${message}`);
            
            window.location.href = `mailto:info@publikeno.com?subject=${subject}&body=${body}`;
        }
    </script>
